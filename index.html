<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXIF Tool</title>
    
    <link href="lib/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1 class="title">EXIF TOOL</h1>

        <div class="card p-3 mb-4" id="bg">
            <h5 class="card-title"> Select Image</h5>
            <div class="mb-3">
                <label for="imageInput" class="form-label">Choose an image file (JPG/JPEG):</label>
                <input type="file" id="imageInput" accept="image/*" class="form-control">
            </div>
            <div class="d-grid gap-2 d-md-block">
                <button id="fetchMetadataButton" class="btn">
                    <i class="bi bi-eye-fill"></i> View EXIF Data
                </button>
                <button id="recordMetadataButton" class="btn" disabled>
                    <i class="bi bi-disc-fill"></i> Record EXIF Data
                </button>
                <button id="removeMetadataButton" class="btn">
                    <i class="bi bi-x-circle-fill"></i> Remove&Download
                </button>
            </div>
        </div>

        <div class="card p-3 mb-4" id="bg">
            <h5 class="card-title"> EXIF Data Output</h5>
            <pre id="metadataOutput">Select an image and click "View EXIF Data" to see the results here.</pre>
            <div id="downloadLinkContainer" class="mt-3"></div>
        </div>
        
        <div class="card p-3 mb-4" id="bg">
            <h5 class="card-title"> Recorded EXIF Data History</h5>
            <div id="recordedDataContainer">
                <ul id="recordedList" class="recorded-list">
                    <li id="noRecordsMessage">No EXIF data has been recorded yet.</li>
                </ul>
            </div>
            <button id="clearAllRecordsButton" class="btn1" >
                Clear All Records
            </button>
        </div>
    </div>

    <script src="lib/bootstrap.bundle.min.js"></script>
    <script src="lib/exif.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
